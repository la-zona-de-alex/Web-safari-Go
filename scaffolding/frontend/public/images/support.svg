<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#g)"/>
  <g transform="translate(16,16)">
    <circle cx="16" cy="8" r="6" fill="#fff" opacity="0.95"/>
    <rect x="10" y="18" width="12" height="6" rx="3" fill="#fff" opacity="0.95"/>
    <g>
      <circle cx="16" cy="8" r="6" fill="none" stroke="#fff" stroke-width="1" opacity="0.14">
        <animate attributeName="r" from="6" to="14" dur="1.6s" repeatCount="indefinite" />
        <animate attributeName="opacity" from="0.14" to="0" dur="1.6s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>
